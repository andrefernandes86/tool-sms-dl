name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Smish Detector/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Smish Detector/**'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: andrefernandes86/smishdetector

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      id: login
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      continue-on-error: true

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix={{branch}}-

    - name: Run basic security checks
      run: |
        echo "## 🔍 Security Checks" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check for common secrets patterns
        echo "### Secrets Scan" >> $GITHUB_STEP_SUMMARY
        if grep -r -i -E "(password|secret|key|token|api_key)" "Smish Detector/" --exclude-dir=.git --exclude="*.md" | grep -v -E "(REPORT_PASSWORD|placeholder|example|TODO)" | head -5; then
          echo "⚠️ **Potential secrets found - review before deployment**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -r -i -E "(password|secret|key|token|api_key)" "Smish Detector/" --exclude-dir=.git --exclude="*.md" | grep -v -E "(REPORT_PASSWORD|placeholder|example|TODO)" | head -5 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ **No hardcoded secrets detected**" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check for common vulnerabilities
        echo "### Vulnerability Patterns" >> $GITHUB_STEP_SUMMARY
        vuln_count=0
        
        # Check for SQL injection patterns
        if grep -r -E "(execute|query).*\+.*request\.|cursor\.execute.*%" "Smish Detector/" --exclude-dir=.git; then
          echo "⚠️ **Potential SQL injection patterns found**" >> $GITHUB_STEP_SUMMARY
          vuln_count=$((vuln_count + 1))
        fi
        
        # Check for command injection patterns  
        if grep -r -E "(os\.system|subprocess\.call|shell=True)" "Smish Detector/" --exclude-dir=.git; then
          echo "⚠️ **Potential command injection patterns found**" >> $GITHUB_STEP_SUMMARY
          vuln_count=$((vuln_count + 1))
        fi
        
        # Check for unsafe file operations
        if grep -r -E "(open\(.*request\.|\.\.\/)" "Smish Detector/" --exclude-dir=.git; then
          echo "⚠️ **Potential path traversal patterns found**" >> $GITHUB_STEP_SUMMARY
          vuln_count=$((vuln_count + 1))
        fi
        
        if [ $vuln_count -eq 0 ]; then
          echo "✅ **No common vulnerability patterns detected**" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: "./Smish Detector"
        file: "./Smish Detector/Dockerfile"
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' && steps.login.outcome == 'success' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan Docker image for basic issues
      if: steps.build.outcome == 'success'
      run: |
        # Load the built image for scanning
        docker images
        
        echo "### Docker Image Security" >> $GITHUB_STEP_SUMMARY
        
        # Check image size
        size=$(docker images --format "table {{.Size}}" ${{ env.IMAGE_NAME }} | tail -n +2 | head -1)
        echo "- **Image Size:** $size" >> $GITHUB_STEP_SUMMARY
        
        # Check for running as root
        if docker run --rm ${{ env.IMAGE_NAME }}:latest whoami 2>/dev/null | grep -q root; then
          echo "⚠️ **Warning:** Container runs as root user" >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ **Good:** Container runs as non-root user" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Check exposed ports
        ports=$(docker inspect ${{ env.IMAGE_NAME }}:latest | jq -r '.[0].Config.ExposedPorts // {} | keys[]' 2>/dev/null || echo "No exposed ports")
        echo "- **Exposed Ports:** $ports" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Update Docker Hub description
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.login.outcome == 'success'
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: ${{ env.IMAGE_NAME }}
        short-description: "Advanced Security Intelligence Platform - Educational cybersecurity research and privacy awareness training tool"
        readme-filepath: ./DOCKER.md
      continue-on-error: true

    - name: Generate build summary
      run: |
        echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.login.outcome }}" == "success" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "✅ **Status:** Built and pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **Usage:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 443:5000 -e REPORT_PASSWORD=sms ${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📍 **Access:** https://localhost:443 (main) | https://localhost:443/report (dashboard, password: sms)" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "✅ **Status:** Built successfully (PR - no push)" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Status:** Built only (Docker Hub credentials not configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To enable publishing:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Add \`DOCKERHUB_USERNAME\` secret: \`andrefernandes86\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Add \`DOCKERHUB_TOKEN\` secret: Your Docker Hub access token" >> $GITHUB_STEP_SUMMARY
        fi