name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Smish Detector/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Smish Detector/**'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: andrefernandes86/smishdetector

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      id: login
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      continue-on-error: true

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: "./Smish Detector"
        file: "./Smish Detector/Dockerfile"
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' && steps.login.outcome == 'success' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update Docker Hub description
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.login.outcome == 'success'
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: ${{ env.IMAGE_NAME }}
        short-description: "Advanced Security Intelligence Platform - Educational cybersecurity research and privacy awareness training tool"
        readme-filepath: ./DOCKER.md
      continue-on-error: true

    - name: Build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.login.outcome }}" == "success" ]; then
          echo "- **Status:** ✅ Built and pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Status:** ⚠️ Built only (Docker Hub secrets not configured)" >> $GITHUB_STEP_SUMMARY
          echo "- **Next Step:** Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets to enable pushing" >> $GITHUB_STEP_SUMMARY
        fi